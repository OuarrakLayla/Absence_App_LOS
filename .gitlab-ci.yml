stages:
  - build
  - test
  - push
  - deploy

variables:
  IMAGE: $DOCKER_USER/gestiabsence:latest

# ── STAGE 1 : Build ──────────────────────────
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $IMAGE .
  only:
    - master

# ── STAGE 2 : Test ───────────────────────────
test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install flask openpyxl --quiet
    - python -c "from app import app, init_db; init_db(); print('Tests OK')"
  only:
    - master

# ── STAGE 3 : Push Docker Hub ─────────────────
push:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $IMAGE .
    - echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin
    - docker push $IMAGE
  only:
    - master

# ── STAGE 4 : Deploy sur K3s ──────────────────
deploy:
  stage: deploy
  image: alpine/k8s:1.28.3
  script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
    - sed -i 's/127.0.0.1/13.61.25.230/g' ~/.kube/config
    - kubectl config set-cluster default --insecure-skip-tls-verify=true
    - kubectl apply -f kubernetes/deployment.yaml
    - kubectl rollout restart deployment/gestiabsence
    - kubectl get pods
  only:
    - master