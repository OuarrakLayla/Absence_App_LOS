apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestiabsence
  labels:
    app: gestiabsence
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gestiabsence
  template:
    metadata:
      labels:
        app: gestiabsence
    spec:
      containers:
      - name: gestiabsence
        image: ouarraklayla/gestiabsence:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: gestiabsence-svc
spec:
  type: NodePort
  selector:
    app: gestiabsence
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30080